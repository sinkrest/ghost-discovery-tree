<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Tree Experiment — Opportunity Solution Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f9fafb;
  --bg-card: #ffffff;
  --border: #e5e7eb;
  --text: #15171a;
  --text-secondary: #6b7280;
  --accent: #30cf43;
  --outcome: #4f46e5;
  --opportunity: #30cf43;
  --solution: #8b5cf6;
  --experiment: #f59e0b;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav h1 {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

nav h1 .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}

nav .subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
}

.nav-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
}

.btn:hover { background: var(--bg); border-color: #d1d5db; }
.btn-primary { background: var(--outcome); color: white; border-color: var(--outcome); }
.btn-primary:hover { opacity: 0.9; background: var(--outcome); }
.btn-danger { color: #ef4444; border-color: #fca5a5; }
.btn-danger:hover { background: #fef2f2; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

main {
  display: flex;
  height: calc(100vh - 53px);
  overflow: hidden;
}

#tree-panel {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

#detail-panel {
  width: 380px;
  min-width: 380px;
  border-left: 1px solid var(--border);
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.detail-tab {
  flex: 1;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.detail-tab:hover { color: var(--text); background: var(--bg); }
.detail-tab.active { color: var(--outcome); border-bottom-color: var(--outcome); }

.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Tree nodes */
.tree-root { padding-left: 0; }

.tree-branch {
  margin-left: 24px;
  border-left: 2px solid var(--border);
  padding-left: 0;
}

.tree-outcome > .tree-branch { border-left-color: #c7d2fe; }
.tree-opportunity > .tree-branch { border-left-color: #bbf7d0; }
.tree-solution > .tree-branch { border-left-color: #ddd6fe; }

.tree-node {
  margin-bottom: 6px;
}

.node-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  transition: all 0.15s;
  margin-left: -1px;
  position: relative;
}

.node-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.node-card.selected { border-color: var(--outcome); box-shadow: 0 0 0 2px rgba(79,70,229,0.15); }

.node-chevron {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 12px;
  transition: transform 0.15s;
  border-radius: 4px;
}

.node-chevron:hover { background: var(--bg); }
.node-chevron.expanded { transform: rotate(90deg); }
.node-chevron.hidden { visibility: hidden; }

.node-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}

.node-card:hover .node-actions { opacity: 1; }

.node-action-btn {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-secondary);
  transition: all 0.1s;
  font-family: var(--font);
  padding: 0;
}

.node-action-btn:hover { background: #e5e7eb; color: var(--text); }
.node-action-btn.delete-btn:hover { background: #fee2e2; color: #ef4444; }

.add-outcome-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s;
}

.add-outcome-btn:hover { border-color: var(--outcome); color: var(--outcome); background: #eef2ff; }

.node-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.badge-outcome { background: #eef2ff; color: var(--outcome); }
.badge-opportunity { background: #f0fdf4; color: #16a34a; }
.badge-solution { background: #f5f3ff; color: var(--solution); }
.badge-experiment { background: #fffbeb; color: #d97706; }

.node-info { flex: 1; min-width: 0; }
.node-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.node-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.node-meta {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg);
  color: var(--text-secondary);
}

.score-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

.score-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1.5px solid;
  transition: all 0.1s;
}

.score-dot.filled { border-color: transparent; }

/* Detail panel styles */
.detail-header {
  margin-bottom: 16px;
}

.detail-type {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.detail-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
}

.detail-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
}

.detail-section {
  margin-top: 20px;
}

.detail-section h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.score-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}

.score-label {
  font-size: 13px;
  font-weight: 500;
}

.score-edit-dots {
  display: flex;
  gap: 4px;
}

.score-edit-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid;
  cursor: pointer;
  transition: all 0.1s;
}

.score-edit-dot:hover { transform: scale(1.2); }
.score-edit-dot.filled { border-color: transparent; }

.assumption-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border-radius: 6px;
  margin-bottom: 6px;
}

.assumption-status {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  border: none;
  font-family: var(--font);
}

.status-untested { background: #f3f4f6; color: #6b7280; }
.status-testing { background: #dbeafe; color: #2563eb; }
.status-validated { background: #dcfce7; color: #16a34a; }
.status-invalidated { background: #fee2e2; color: #dc2626; }

.assumption-text {
  font-size: 13px;
  line-height: 1.4;
}

.detail-actions {
  margin-top: 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Signal inbox */
.signal-card {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  transition: all 0.15s;
}

.signal-card:hover { border-color: #d1d5db; }

.signal-source {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 3px;
  display: inline-block;
  margin-bottom: 4px;
}

.source-forum { background: #dbeafe; color: #2563eb; }
.source-competitor { background: #fee2e2; color: #dc2626; }
.source-github { background: #f3f4f6; color: #374151; }
.source-hn { background: #ffedd5; color: #c2410c; }

.signal-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}

.signal-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.signal-meta {
  font-size: 11px;
  color: var(--text-secondary);
}

/* AI Brief */
.brief-output {
  font-size: 14px;
  line-height: 1.6;
}

.brief-output h2 { font-size: 16px; margin-top: 20px; margin-bottom: 8px; }
.brief-output h3 { font-size: 14px; margin-top: 16px; margin-bottom: 6px; }
.brief-output p { margin-bottom: 10px; }
.brief-output ul { padding-left: 20px; margin-bottom: 10px; }
.brief-output li { margin-bottom: 4px; }
.brief-output strong { font-weight: 600; }

.brief-placeholder {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.brief-placeholder p { font-size: 14px; margin-bottom: 16px; }

.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--outcome);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Add node modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 24px;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}

.modal h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
}

.modal label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  margin-top: 12px;
}

.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 13px;
  resize: vertical;
}

.modal textarea { min-height: 60px; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.empty-state p { font-size: 14px; }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}

.stat-num {
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
}

/* Responsive */
@media (max-width: 800px) {
  main { flex-direction: column; height: auto; }
  #tree-panel { overflow: visible; }
  #detail-panel { width: 100%; min-width: 0; border-left: none; border-top: 1px solid var(--border); }
  .tree-branch { margin-left: 16px; }
}
</style>
</head>
<body>

<nav>
  <div>
    <h1><span class="dot"></span> Discovery Tree Experiment</h1>
    <span class="subtitle">Opportunity Solution Tree — Teresa Torres Framework</span>
  </div>
  <div class="nav-actions">
    <button class="btn btn-sm" onclick="expandAll()">Expand All</button>
    <button class="btn btn-sm" onclick="collapseAll()">Collapse All</button>
    <button class="btn btn-sm btn-danger" onclick="resetTree()">Reset</button>
  </div>
</nav>

<main>
  <div id="tree-panel">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--outcome)"></div> Outcome</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--opportunity)"></div> Opportunity</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--solution)"></div> Solution</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--experiment)"></div> Experiment</div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div id="tree-container"></div>
  </div>

  <div id="detail-panel">
    <div class="detail-tabs">
      <button class="detail-tab active" data-tab="details" onclick="switchTab('details')">Details</button>
      <button class="detail-tab" data-tab="signals" onclick="switchTab('signals')">Signals <span id="signal-count"></span></button>
      <button class="detail-tab" data-tab="brief" onclick="switchTab('brief')">AI Brief</button>
    </div>
    <div class="detail-content">
      <div class="tab-pane active" id="tab-details">
        <div class="empty-state">
          <p>Select a node in the tree to view details</p>
        </div>
      </div>
      <div class="tab-pane" id="tab-signals"></div>
      <div class="tab-pane" id="tab-brief">
        <div class="brief-placeholder">
          <p>Generate an AI-powered Discovery Brief from the current tree state</p>
          <button class="btn btn-primary" onclick="generateBrief()">Generate Discovery Brief</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── Data ──

var DEFAULT_TREE = [
  {
    id: 'outcome-1', type: 'outcome',
    title: 'Increase Creator Retention',
    description: 'Reduce churn among active Ghost creators by making the platform stickier and more valuable',
    expanded: true,
    children: [
      {
        id: 'opp-1', type: 'opportunity',
        title: 'Creators lack actionable analytics',
        description: "Ghost's native analytics show basic pageviews but don't surface the metrics creators need to grow (member conversion, content performance, revenue trends)",
        source: 'Forum + User Research',
        scores: { customerValue: 5, businessImpact: 4, effort: 4 },
        expanded: true,
        children: [
          {
            id: 'sol-1', type: 'solution',
            title: 'Enhanced analytics dashboard',
            description: 'Build a native analytics view showing member conversion funnels, content performance by type, and revenue attribution',
            expanded: true,
            children: [
              {
                id: 'exp-1', type: 'experiment',
                title: 'Prototype with 10 power creators',
                description: 'Build a clickable prototype of the new analytics view and test with 10 creators who publish 3+ times/week',
                status: 'untested',
                assumptions: ['Creators will check analytics weekly if data is actionable', 'Member conversion funnel is the #1 missing metric']
              }
            ]
          },
          {
            id: 'sol-2', type: 'solution',
            title: 'Weekly email digest with insights',
            description: 'Automated weekly email to creators summarizing their key metrics with AI-generated recommendations',
            expanded: true,
            children: [
              {
                id: 'exp-2', type: 'experiment',
                title: 'Manual email to 20 creators for 4 weeks',
                description: 'Send manually crafted weekly digests to 20 creators and measure engagement + retention impact',
                status: 'untested',
                assumptions: ['Creators prefer push (email) over pull (dashboard) for metrics', 'AI recommendations will feel actionable not generic']
              }
            ]
          }
        ]
      },
      {
        id: 'opp-2', type: 'opportunity',
        title: 'Authentication friction blocks team adoption',
        description: "Third-party SSO is the #1 voted Forum request (174 votes). Teams and organizations can't use Ghost with their existing identity providers.",
        source: 'Forum (174 votes)',
        scores: { customerValue: 5, businessImpact: 5, effort: 3 },
        expanded: true,
        children: [
          {
            id: 'sol-3', type: 'solution',
            title: 'Native SSO/SAML support',
            description: 'Support SAML 2.0 and OAuth for enterprise team login. Start with Google Workspace and Okta.',
            expanded: true,
            children: [
              {
                id: 'exp-3', type: 'experiment',
                title: 'Survey top 50 team accounts on auth needs',
                description: 'Identify which SSO providers are most requested and whether SSO alone would unblock team plan upgrades',
                status: 'untested',
                assumptions: ['SSO is a hard blocker for team plan upgrades, not just a nice-to-have', 'Google Workspace + Okta covers 80% of demand']
              }
            ]
          }
        ]
      },
      {
        id: 'opp-3', type: 'opportunity',
        title: 'No native content repurposing workflow',
        description: 'Creators manually reformatting newsletter content for social, podcast notes, etc. High manual effort reduces publishing frequency.',
        source: 'User Research + Competitor (Kit)',
        scores: { customerValue: 4, businessImpact: 3, effort: 3 },
        expanded: false,
        children: [
          {
            id: 'sol-4', type: 'solution',
            title: 'AI-powered "Repurpose" button on each post',
            description: 'One-click repurposing: newsletter to thread, social post, podcast intro, re-engagement email. Preserves creator voice.',
            expanded: true,
            children: [
              {
                id: 'exp-4', type: 'experiment',
                title: 'A/B test repurpose button with 100 creators',
                description: 'Add repurpose button to post editor for test group. Measure: usage rate, publishing frequency change, satisfaction score.',
                status: 'untested',
                assumptions: ['Creators will use automated repurposing if voice preservation is high quality', 'Repurposing increases social distribution which drives new member signups']
              }
            ]
          }
        ]
      }
    ]
  },
  {
    id: 'outcome-2', type: 'outcome',
    title: 'Grow Platform Adoption via Social Web',
    description: 'Leverage ActivityPub and the open social web to make Ghost the publishing hub of the fediverse',
    expanded: true,
    children: [
      {
        id: 'opp-4', type: 'opportunity',
        title: 'ActivityPub integration is incomplete',
        description: "Ghost supports basic ActivityPub (follow/read) but lacks replies, likes, boosts. Creators can't fully participate in the fediverse from Ghost.",
        source: 'GitHub Issues + Community',
        scores: { customerValue: 3, businessImpact: 5, effort: 4 },
        expanded: true,
        children: [
          {
            id: 'sol-5', type: 'solution',
            title: 'Full ActivityPub interactions (replies, likes, boosts)',
            description: 'Enable two-way ActivityPub: creators see and respond to fediverse interactions directly in Ghost admin.',
            expanded: true,
            children: [
              {
                id: 'exp-5', type: 'experiment',
                title: 'Beta with 50 fediverse-active creators',
                description: 'Ship replies + likes to beta group. Measure: fediverse engagement rate, new follower growth, creator satisfaction.',
                status: 'untested',
                assumptions: ['Fediverse interactions drive meaningful audience growth for creators', 'Creators will engage with fediverse replies (not just broadcast)']
              }
            ]
          }
        ]
      },
      {
        id: 'opp-5', type: 'opportunity',
        title: "Discoverability is creator's #1 growth challenge",
        description: "Ghost has no native recommendation or discovery system. Creators rely entirely on external channels for growth. Substack's recommendation network is a key competitive advantage.",
        source: 'Forum + Competitor Analysis',
        scores: { customerValue: 5, businessImpact: 5, effort: 5 },
        expanded: true,
        children: [
          {
            id: 'sol-6', type: 'solution',
            title: 'Ghost Recommendations Network',
            description: 'Native recommendation system where Ghost creators can recommend each other, creating a cross-pollination growth loop.',
            expanded: true,
            children: [
              {
                id: 'exp-6', type: 'experiment',
                title: 'Manual recommendations pilot with 30 creators',
                description: 'Manually curate recommendations between 30 complementary creators. Measure: subscriber crossover rate, creator willingness to participate.',
                status: 'untested',
                assumptions: ['Creators will recommend peers if it is reciprocal and curated', 'Cross-recommendations drive meaningful subscriber growth (>5% conversion)']
              }
            ]
          }
        ]
      }
    ]
  }
];

var DEFAULT_SIGNALS = [

// ── State ──

var tree = [];
var signals = [];
var selectedNodeId = null;
var nextId = 100;

function loadState() {
  try {
    var saved = localStorage.getItem('ghost-discovery-tree');
    if (saved) {
      var parsed = JSON.parse(saved);
      tree = parsed.tree || JSON.parse(JSON.stringify(DEFAULT_TREE));
      signals = parsed.signals || JSON.parse(JSON.stringify(DEFAULT_SIGNALS));
      nextId = parsed.nextId || 100;
    } else {
      tree = JSON.parse(JSON.stringify(DEFAULT_TREE));
      signals = JSON.parse(JSON.stringify(DEFAULT_SIGNALS));
    }
  } catch (e) {
    tree = JSON.parse(JSON.stringify(DEFAULT_TREE));
    signals = JSON.parse(JSON.stringify(DEFAULT_SIGNALS));
  }
}

function saveState() {
  localStorage.setItem('ghost-discovery-tree', JSON.stringify({
    tree: tree,
    signals: signals,
    nextId: nextId
  }));
}

function resetTree() {
  if (!confirm('Reset tree to defaults? All modifications will be lost.')) return;
  localStorage.removeItem('ghost-discovery-tree');
  selectedNodeId = null;
  loadState();
  render();
}

// ── Tree helpers ──

function findNode(nodes, id) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) return nodes[i];
    if (nodes[i].children) {
      var found = findNode(nodes[i].children, id);
      if (found) return found;
    }
  }
  return null;
}

function findParent(nodes, id, parent) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) return parent;
    if (nodes[i].children) {
      var found = findParent(nodes[i].children, id, nodes[i]);
      if (found) return found;
    }
  }
  return null;
}

function removeNode(nodes, id) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) {
      nodes.splice(i, 1);
      return true;
    }
    if (nodes[i].children && removeNode(nodes[i].children, id)) return true;
  }
  return false;
}

function countByType(nodes, type) {
  var count = 0;
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].type === type) count++;
    if (nodes[i].children) count += countByType(nodes[i].children, type);
  }
  return count;
}

function getAllNodes(nodes, result) {
  result = result || [];
  for (var i = 0; i < nodes.length; i++) {
    result.push(nodes[i]);
    if (nodes[i].children) getAllNodes(nodes[i].children, result);
  }
  return result;
}

function setExpandedAll(nodes, val) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].children && nodes[i].children.length > 0) nodes[i].expanded = val;
    if (nodes[i].children) setExpandedAll(nodes[i].children, val);
  }
}

function expandAll() { setExpandedAll(tree, true); saveState(); render(); }
function collapseAll() { setExpandedAll(tree, false); saveState(); render(); }

// ── Render tree ──

function renderNode(node) {
  var hasChildren = node.children && node.children.length > 0;
  var isExpanded = node.expanded !== false;
  var isSelected = node.id === selectedNodeId;

  var html = '<div class="tree-node tree-' + node.type + '">';
  html += '<div class="node-card' + (isSelected ? ' selected' : '') + '" data-id="' + node.id + '" onclick="selectNode(\'' + node.id + '\')">';

  // Chevron
  if (hasChildren) {
    html += '<div class="node-chevron' + (isExpanded ? ' expanded' : '') + '" onclick="event.stopPropagation(); toggleNode(\'' + node.id + '\')">&#9654;</div>';
  } else {
    html += '<div class="node-chevron hidden">&#9654;</div>';
  }

  // Badge
  html += '<span class="node-badge badge-' + node.type + '">' + node.type + '</span>';

  // Info
  html += '<div class="node-info">';
  html += '<div class="node-title">' + escHtml(node.title) + '</div>';
  if (node.description) {
    html += '<div class="node-desc">' + escHtml(node.description) + '</div>';
  }

  // Meta tags
  var metas = [];
  if (node.source) metas.push(node.source);
  if (node.status) metas.push(node.status);
  if (node.scores) {
    var total = (node.scores.customerValue || 0) + (node.scores.businessImpact || 0);
    metas.push('Score: ' + total + '/10');
  }
  if (metas.length > 0) {
    html += '<div class="node-meta">';
    for (var m = 0; m < metas.length; m++) {
      html += '<span class="meta-tag">' + escHtml(metas[m]) + '</span>';
    }
    html += '</div>';
  }

  html += '</div>'; // node-info

  // Score dots for opportunities
  if (node.type === 'opportunity' && node.scores) {
    html += '<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">';
    html += renderScoreDots(node.scores.customerValue || 0, 'var(--opportunity)');
    html += renderScoreDots(node.scores.businessImpact || 0, 'var(--outcome)');
    html += '</div>';
  }

  // Inline action buttons (visible on hover)
  var childTypes = { outcome: 'opportunity', opportunity: 'solution', solution: 'experiment' };
  html += '<div class="node-actions">';
  if (childTypes[node.type]) {
    html += '<button class="node-action-btn" title="Add ' + childTypes[node.type] + '" onclick="event.stopPropagation(); showAddChild(\'' + node.id + '\', \'' + childTypes[node.type] + '\')">+</button>';
  }
  html += '<button class="node-action-btn delete-btn" title="Remove" onclick="event.stopPropagation(); deleteNode(\'' + node.id + '\')">&#215;</button>';
  html += '</div>';

  html += '</div>'; // node-card

  // Children
  if (hasChildren && isExpanded) {
    html += '<div class="tree-branch">';
    for (var c = 0; c < node.children.length; c++) {
      html += renderNode(node.children[c]);
    }
    html += '</div>';
  }

  html += '</div>'; // tree-node
  return html;
}

function renderScoreDots(value, color) {
  var html = '<div class="score-dots">';
  for (var i = 1; i <= 5; i++) {
    if (i <= value) {
      html += '<div class="score-dot filled" style="background:' + color + ';border-color:' + color + '"></div>';
    } else {
      html += '<div class="score-dot" style="border-color:' + color + '"></div>';
    }
  }
  html += '</div>';
  return html;
}

function renderTree() {
  var container = document.getElementById('tree-container');
  var html = '';
  for (var i = 0; i < tree.length; i++) {
    html += renderNode(tree[i]);
  }
  html += '<button class="add-outcome-btn" onclick="addOutcome()">+ Add Outcome</button>';
  container.innerHTML = html;

  // Stats
  var stats = document.getElementById('stats-bar');
  var outcomes = countByType(tree, 'outcome');
  var opps = countByType(tree, 'opportunity');
  var sols = countByType(tree, 'solution');
  var exps = countByType(tree, 'experiment');
  var allExps = getAllNodes(tree).filter(function(n) { return n.type === 'experiment'; });
  var untested = allExps.filter(function(n) { return n.status === 'untested'; }).length;

  stats.innerHTML =
    '<div class="stat"><span class="stat-num">' + outcomes + '</span> Outcomes</div>' +
    '<div class="stat"><span class="stat-num">' + opps + '</span> Opportunities</div>' +
    '<div class="stat"><span class="stat-num">' + sols + '</span> Solutions</div>' +
    '<div class="stat"><span class="stat-num">' + exps + '</span> Experiments</div>' +
    '<div class="stat" style="color:#f59e0b"><span class="stat-num" style="color:#f59e0b">' + untested + '</span> Untested</div>';
}

// ── Node interactions ──

function selectNode(id) {
  selectedNodeId = id;
  switchTab('details');
  render();
}

function toggleNode(id) {
  var node = findNode(tree, id);
  if (node) {
    node.expanded = !node.expanded;
    saveState();
    render();
  }
}

  }

  if (!node) {

  }

  var typeColors = { outcome: 'var(--outcome)', opportunity: 'var(--opportunity)', solution: 'var(--solution)', experiment: 'var(--experiment)' };

  var html = '<div class="detail-header">';
  html += '<div class="detail-type" style="color:' + color + '">' + node.type + '</div>';
  html += '<div class="detail-title">' + escHtml(node.title) + '</div>';
  html += '<div class="detail-desc">' + escHtml(node.description || '') + '</div>';

  if (node.source) {
    html += '<div class="detail-section"><h3>Source</h3><p style="font-size:13px">' + escHtml(node.source) + '</p></div>';
  }

  // Scores (opportunities)
  if (node.type === 'opportunity') {
    html += '<div class="detail-section"><h3>Scores</h3>';
    html += renderScoreRow('Customer Value', node.scores ? node.scores.customerValue : 0, 'customerValue', node.id, 'var(--opportunity)');
    html += renderScoreRow('Business Impact', node.scores ? node.scores.businessImpact : 0, 'businessImpact', node.id, 'var(--outcome)');
    html += renderScoreRow('Effort', node.scores ? node.scores.effort : 0, 'effort', node.id, 'var(--solution)');
    html += '</div>';
  }

  // Assumptions (experiments)
  if (node.type === 'experiment') {
    html += '<div class="detail-section"><h3>Status</h3>';
    html += '<button class="assumption-status status-' + (node.status || 'untested') + '" onclick="cycleNodeStatus(\'' + node.id + '\')">' + (node.status || 'untested') + '</button>';
    html += '</div>';

    if (node.assumptions && node.assumptions.length > 0) {
      html += '<div class="detail-section"><h3>Assumptions</h3>';
      for (var a = 0; a < node.assumptions.length; a++) {
        html += '<div class="assumption-item"><span class="assumption-text">' + escHtml(node.assumptions[a]) + '</span></div>';
      }
      html += '</div>';
    }
  }

  // Actions
  html += '<div class="detail-actions">';

  var childTypes = { outcome: 'opportunity', opportunity: 'solution', solution: 'experiment' };
  if (childTypes[node.type]) {
    html += '<button class="btn btn-sm" onclick="showAddChild(\'' + node.id + '\', \'' + childTypes[node.type] + '\')">+ Add ' + childTypes[node.type] + '</button>';
  }

  html += '<button class="btn btn-sm btn-danger" onclick="deleteNode(\'' + node.id + '\')">Remove</button>';

  html += '</div>';

}

function renderScoreRow(label, value, key, nodeId, color) {
  var html = '<div class="score-row">';
  html += '<span class="score-label">' + label + '</span>';
  html += '<div class="score-edit-dots">';
  for (var i = 1; i <= 5; i++) {
    var filled = i <= (value || 0);
    html += '<div class="score-edit-dot' + (filled ? ' filled' : '') + '" style="' +
      (filled ? 'background:' + color + ';' : '') + 'border-color:' + color + '" onclick="setScore(\'' + nodeId + '\',\'' + key + '\',' + i + ')"></div>';
  }
  html += '</div></div>';
  return html;
}

function setScore(nodeId, key, value) {
  var node = findNode(tree, nodeId);
  if (!node) return;
  if (!node.scores) node.scores = {};
  node.scores[key] = value;
  saveState();
  render();
}

function cycleNodeStatus(nodeId) {
  var node = findNode(tree, nodeId);
  if (!node) return;
  var statuses = ['untested', 'testing', 'validated', 'invalidated'];
  var idx = statuses.indexOf(node.status || 'untested');
  node.status = statuses[(idx + 1) % statuses.length];
  saveState();
  render();
}

function deleteNode(nodeId) {
  if (!confirm('Remove this node and all its children?')) return;
  removeNode(tree, nodeId);
  if (selectedNodeId === nodeId) selectedNodeId = null;
  saveState();
  render();
}

function addOutcome() {

// ── Add child modal ──

function showAddChild(parentId, childType) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  var modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML =
    '<h2>Add ' + childType.charAt(0).toUpperCase() + childType.slice(1) + '</h2>' +
    '<label>Title</label><input type="text" id="modal-title" placeholder="Enter title...">' +
    '<label>Description</label><textarea id="modal-desc" placeholder="Enter description..."></textarea>' +
    (childType === 'experiment' ? '<label>Assumptions (one per line)</label><textarea id="modal-assumptions" placeholder="One assumption per line..."></textarea>' : '') +
    (childType === 'opportunity' ? '<label>Source</label><input type="text" id="modal-source" placeholder="e.g. Forum, GitHub, Competitor...">' : '') +
    '<div class="modal-actions">' +
    '<button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
    '<button class="btn btn-primary" id="modal-save">Add</button>' +
    '</div>';

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  setTimeout(function() { document.getElementById('modal-title').focus(); }, 50);

  document.getElementById('modal-save').onclick = function() {
    var title = document.getElementById('modal-title').value.trim();
    if (!title) return;

    var newNode = {
      id: childType.substring(0, 3) + '-' + (nextId++),
      type: childType,
      title: title,
      description: document.getElementById('modal-desc').value.trim(),
      expanded: true
    };

    if (childType === 'experiment') {
      newNode.status = 'untested';
      var assumptionsEl = document.getElementById('modal-assumptions');
      if (assumptionsEl && assumptionsEl.value.trim()) {
        newNode.assumptions = assumptionsEl.value.trim().split('\n').filter(function(a) { return a.trim(); });
      } else {
        newNode.assumptions = [];
      }
    }

    if (childType === 'opportunity') {
      newNode.scores = { customerValue: 3, businessImpact: 3, effort: 3 };
      var sourceEl = document.getElementById('modal-source');
      if (sourceEl) newNode.source = sourceEl.value.trim();
    }

    var parent = findNode(tree, parentId);
    if (parent) {
      if (!parent.children) parent.children = [];
      parent.children.push(newNode);
      parent.expanded = true;
    }

    saveState();
    selectedNodeId = newNode.id;
    overlay.remove();
    render();
  };
}

function addSignalToTree(signalId) {
  var signal = null;
  var signalIdx = -1;
  for (var i = 0; i < signals.length; i++) {
    if (signals[i].id === signalId) { signal = signals[i]; signalIdx = i; break; }
  }
  if (!signal) return;

  // Show modal to pick parent outcome
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  var outcomes = tree.filter(function(n) { return n.type === 'outcome'; });
  var optionsHtml = '';
  for (var o = 0; o < outcomes.length; o++) {
    optionsHtml += '<option value="' + outcomes[o].id + '">' + escHtml(outcomes[o].title) + '</option>';
  }

  var modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML =
    '<h2>Add Signal as Opportunity</h2>' +
    '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">"' + escHtml(signal.title) + '"</p>' +
    '<label>Parent Outcome</label><select id="modal-parent">' + optionsHtml + '</select>' +
    '<label>Title</label><input type="text" id="modal-title" value="' + escHtml(signal.title).replace(/"/g, '&quot;') + '">' +
    '<label>Description</label><textarea id="modal-desc">' + escHtml(signal.description) + '</textarea>' +
    '<div class="modal-actions">' +
    '<button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
    '<button class="btn btn-primary" id="modal-save">Add as Opportunity</button>' +
    '</div>';

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  document.getElementById('modal-save').onclick = function() {
    var parentId = document.getElementById('modal-parent').value;
    var title = document.getElementById('modal-title').value.trim();
    if (!title || !parentId) return;

    var newOpp = {
      id: 'opp-' + (nextId++),
      type: 'opportunity',
      title: title,
      description: document.getElementById('modal-desc').value.trim(),
      source: signal.source + (signal.votes ? ' (' + signal.votes + ' votes)' : '') + (signal.issues ? ' (' + signal.issues + ' issues)' : ''),
      scores: { customerValue: 3, businessImpact: 3, effort: 3 },
      expanded: true,
      children: []
    };

    var parent = findNode(tree, parentId);
    if (parent) {
      if (!parent.children) parent.children = [];
      parent.children.push(newOpp);
      parent.expanded = true;
    }

    // Remove signal from inbox
    signals.splice(signalIdx, 1);

    saveState();
    selectedNodeId = newOpp.id;
    overlay.remove();
    render();
  };
}

// ── AI Brief ──

var briefGenerating = false;

function generateBrief() {
  if (briefGenerating) return;
  briefGenerating = true;

  var pane = document.getElementById('tab-brief');
  pane.innerHTML = '<div class="brief-placeholder"><p><span class="spinner"></span> Generating Discovery Brief...</p></div>';

  fetch('/api/synthesize', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ tree: tree })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    briefGenerating = false;
    if (data.error) {
      pane.innerHTML = '<div class="brief-placeholder"><p style="color:#ef4444">Error: ' + escHtml(data.error) + '</p><button class="btn btn-primary" onclick="generateBrief()">Retry</button></div>';
      return;
    }
    var briefHtml = marked.parse(data.brief || 'No brief generated.');
    pane.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h3 style="font-size:14px;font-weight:600">Discovery Brief</h3>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
      '<span style="font-size:11px;color:var(--text-secondary)">' + new Date(data.generated_at).toLocaleString() + '</span>' +
      '<button class="btn btn-sm" onclick="generateBrief()">Regenerate</button>' +
      '</div></div>' +
      '<div class="brief-output">' + briefHtml + '</div>';
  })
  .catch(function(err) {
    briefGenerating = false;
    pane.innerHTML = '<div class="brief-placeholder"><p style="color:#ef4444">Error: ' + escHtml(err.message) + '</p><button class="btn btn-primary" onclick="generateBrief()">Retry</button></div>';
  });
}

// ── Tabs ──

function switchTab(tabName) {
  var tabs = document.querySelectorAll('.detail-tab');
  var panes = document.querySelectorAll('.tab-pane');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tabName);
  }
  for (var j = 0; j < panes.length; j++) {
    panes[j].classList.toggle('active', panes[j].id === 'tab-' + tabName);
  }
}

// ── Utils ──

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Render all ──

function render() {
  renderTree();
  renderDetailPanel();
  renderSignals();
}

// ── Init ──

loadState();
render();
</script>
